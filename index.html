<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Todo App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Container */
.container {
    width: 450px;
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

/* Title */
h2 {
    text-align: center;
    color: #38bdf8;
    margin-bottom: 15px;
}

/* Input */
.input-box {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* Buttons */
button {
    padding: 10px;
    border: none;
    background: #38bdf8;
    color: #0f172a;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Filters */
.filters {
    display: flex;
    justify-content: space-between;
    margin: 15px 0;
}

.filters button {
    flex: 1;
    margin: 0 3px;
    background: #1e293b;
    color: white;
}

.filters button.active {
    background: #38bdf8;
    color: #0f172a;
}

/* Task list */
ul {
    list-style: none;
}

li {
    background: #1e293b;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
}

/* completed */
li.completed {
    text-decoration: line-through;
    opacity: 0.6;
}

/* actions */
.actions button {
    margin-left: 5px;
    padding: 5px 8px;
    font-size: 12px;
}

.delete {
    background: #ef4444;
    color: white;
}

.edit {
    background: #f59e0b;
    color: white;
}
</style>
</head>

<body>

<div class="container">

<h2>Pro Todo App</h2>

<div class="input-box">
    <input type="text" id="taskInput" placeholder="Add a task...">
    <button onclick="addTask()">Add</button>
</div>

<!-- FILTERS -->
<div class="filters">
    <button onclick="setFilter('all')" class="active">All</button>
    <button onclick="setFilter('active')">Active</button>
    <button onclick="setFilter('completed')">Completed</button>
</div>

<ul id="taskList"></ul>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filter = "all";

/* SAVE */
function save() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
    render();
}

/* ADD */
function addTask() {
    const input = document.getElementById("taskInput");
    const text = input.value.trim();

    if (!text) return;

    tasks.push({
        text,
        completed: false
    });

    input.value = "";
    save();
}

/* DELETE */
function deleteTask(index) {
    tasks.splice(index, 1);
    save();
}

/* TOGGLE COMPLETE */
function toggle(index) {
    tasks[index].completed = !tasks[index].completed;
    save();
}

/* EDIT */
function editTask(index) {
    const newText = prompt("Edit task:", tasks[index].text);
    if (newText !== null && newText.trim() !== "") {
        tasks[index].text = newText;
        save();
    }
}

/* FILTER */
function setFilter(type) {
    filter = type;

    document.querySelectorAll(".filters button")
        .forEach(btn => btn.classList.remove("active"));

    event.target.classList.add("active");

    render();
}

/* RENDER */
function render() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    let filtered = tasks;

    if (filter === "active") {
        filtered = tasks.filter(t => !t.completed);
    } else if (filter === "completed") {
        filtered = tasks.filter(t => t.completed);
    }

    filtered.forEach((task, index) => {
        list.innerHTML += `
            <li class="${task.completed ? "completed" : ""}">
                <span onclick="toggle(${index})">${task.text}</span>

                <div class="actions">
                    <button class="edit" onclick="editTask(${index})">✏</button>
                    <button onclick="toggle(${index})">✔</button>
                    <button class="delete" onclick="deleteTask(${index})">X</button>
                </div>
            </li>
        `;
    });
}

/* INIT */
render();
</script>

</body>
</html>
